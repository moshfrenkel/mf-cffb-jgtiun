<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1413">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MoshFit · CFFB-01</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&family=Secular+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1413; --bg2:#101a19; --card:#16201f; --line:#22322f;
    --turq:#2BBCB3; --orange:#F4A261; --txt:#e9f1f0; --dim:#88a09c;
    --safe:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:'Heebo',sans-serif;line-height:1.55;padding-bottom:calc(78px + var(--safe))}
  .latin{direction:ltr;unicode-bidi:isolate}
  #view{max-width:560px;margin:0 auto;padding:14px 15px 20px}

  .hero{padding:18px 2px 14px}
  .kick{direction:ltr;text-align:right;font-size:11px;letter-spacing:2px;color:var(--orange);font-weight:600}
  .hero h1{font-family:'Secular One';font-size:clamp(28px,9vw,40px);line-height:1.04;margin-top:4px}
  .hero h1 em{color:var(--turq);font-style:normal}
  .focus{color:var(--dim);font-size:14px;margin-top:6px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0}
  .card.soft{background:var(--bg2)}
  .card.accent{border-color:rgba(43,188,179,.4)}
  .tappable{cursor:pointer;transition:transform .12s,border-color .12s}
  .tappable:active{transform:scale(.985)}
  .card-h{font-family:'Secular One';font-size:17px;margin-bottom:10px}
  .mini{font-size:14px;color:var(--dim)}
  .go{margin-top:12px;color:var(--turq);font-weight:600;font-size:14px}

  .macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .macros>div{background:var(--bg2);border-radius:11px;padding:10px 4px}
  .macros b{display:block;font-family:'Secular One';font-size:19px;color:var(--turq);direction:ltr}
  .macros i{font-style:normal;font-size:11px;color:var(--dim)}

  .check{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .check:last-child{border-bottom:none}
  .check input{width:23px;height:23px;accent-color:var(--turq);flex:none}
  .check span{display:flex;flex-direction:column}
  .check b{font-weight:600;font-size:15px}.check i{font-style:normal;font-size:12px;color:var(--dim)}

  .totalbar{display:flex;justify-content:space-between;align-items:center;background:var(--orange);color:#231405;font-weight:600;padding:11px 16px;border-radius:12px;margin:8px 0 14px;font-size:14px}
  .totalbar .latin{font-size:11px;letter-spacing:1.5px;opacity:.7}
  .stage{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
  .st-head{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .st-tag{font-size:10px;font-weight:800;letter-spacing:1px;color:#04201d;background:var(--turq);padding:3px 7px;border-radius:5px}
  .st-title{font-family:'Secular One';font-size:16px;flex:1}
  .st-time{color:var(--orange);font-weight:600;direction:ltr}
  .st-body{font-size:14px;color:#cfe0dd}
  .st-timer{margin-top:11px;width:100%;background:var(--bg2);border:1px solid var(--turq);color:var(--turq);padding:10px;border-radius:9px;font-family:'Heebo';font-weight:600;font-size:14px;cursor:pointer}
  .st-count{text-align:center;direction:ltr;margin-top:8px;min-height:0;display:flex;flex-direction:column;align-items:center;gap:2px}
  .st-count .big{font-family:'Secular One';font-size:46px;line-height:1;color:var(--turq)}
  .st-count .big.work{color:var(--turq)} .st-count .big.rest{color:var(--orange)} .st-count .big.done{color:#7fe6c8;font-size:30px}
  .st-count .sub{font-size:13px;color:var(--dim)}
  .st-count .rd{font-size:12px;letter-spacing:1px;color:var(--orange);font-weight:600}

  .bigbtn{width:100%;background:linear-gradient(100deg,var(--turq),#1d9c94);color:#04100f;border:none;padding:17px;border-radius:13px;font-family:'Heebo';font-weight:600;font-size:16px;margin-top:16px;cursor:pointer}

  /* weights entry */
  .lifts .liftrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .lf-name b{font-weight:600;font-size:15px;display:block}.lf-name i{font-style:normal;font-size:11.5px;color:var(--dim)}
  .lf-in{display:flex;align-items:center;gap:7px;flex:none}
  .lf-in input{width:64px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 6px;font-family:'Heebo';font-size:16px;text-align:center;direction:ltr}
  .lf-in input:focus{outline:none;border-color:var(--turq)}
  .lf-in span{color:var(--dim)}

  /* finish log */
  .field.col{flex-direction:column;align-items:stretch;gap:7px}
  .field textarea{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px;font-family:'Heebo';font-size:15px;resize:vertical;width:100%}
  .field textarea:focus,.field input:focus{outline:none;border-color:var(--turq)}
  .seg{display:flex;gap:7px}
  .seg-b{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--dim);padding:10px;border-radius:9px;font-family:'Heebo';font-size:14px;cursor:pointer}
  .seg-b.on{border-color:var(--turq);color:var(--turq);font-weight:600}

  /* personal records */
  .prrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .prrow:last-of-type{border-bottom:none}
  .pr-lift{flex:1}.pr-lift b{font-weight:600;font-size:15px;display:block}.pr-lift i{font-style:normal;font-size:11px;color:var(--dim)}
  .pr-val{display:flex;align-items:baseline;gap:8px}
  .pr-w{font-family:'Secular One';font-size:22px;color:var(--turq)}.pr-w small{font-size:11px;color:var(--dim);margin-right:2px}
  .pr-x{font-size:14px;color:var(--dim)}
  .pr-e{font-size:12px;color:var(--orange);background:var(--bg2);padding:4px 8px;border-radius:7px;flex:none}
  .lf-tags{color:var(--turq)!important;font-size:12px;margin-top:2px}

  .box{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .box:last-child{border-bottom:none}
  .b-when{color:var(--orange);font-weight:600;white-space:nowrap;font-size:12.5px}
  .b-p{color:var(--turq);font-weight:600}
  .shop-cat{color:var(--orange);font-weight:600;font-size:13px;margin:13px 0 3px}
  .shoplist{list-style:none;font-size:14px}
  .shoplist li{padding:6px 18px 6px 0;position:relative;border-bottom:1px solid var(--line)}
  .shoplist li:last-child{border-bottom:none}
  .shoplist li::before{content:"";position:absolute;right:0;top:13px;width:6px;height:6px;background:var(--turq);border-radius:50%}

  .field{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .field span{font-size:15px}
  .field input{width:110px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px 12px;font-family:'Heebo';font-size:16px;text-align:center;direction:ltr}
  .field input:focus{outline:none;border-color:var(--turq)}
  .htab{width:100%;border-collapse:collapse;font-size:14px}
  .htab th,.htab td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line)}
  .htab th{color:var(--turq);font-size:12px;font-weight:600}
  .logrow{display:flex;flex-direction:column;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .logrow:last-child{border-bottom:none}
  .logrow .latin{color:var(--dim);font-size:11px}.logrow b{font-weight:600}.logrow i{font-style:normal;color:var(--dim)}

  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:10px 0}
  .cal-h{text-align:center;font-size:11px;color:var(--dim);padding-bottom:2px}
  .cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--card)}
  .cal-cell.empty{border:none;background:transparent}
  .cal-cell .cd{font-size:9px;color:var(--dim)}
  .cal-cell .cl{font-family:'Secular One';font-size:17px;line-height:1}
  .cal-cell.tr{cursor:pointer} .cal-cell.tr .cl{color:var(--turq)}
  .cal-cell.tr:active{transform:scale(.94)}
  .cal-cell.rt .cl{color:#3a4d49;font-size:14px}
  .cal-cell.today{border-color:var(--orange);border-width:2px}
  .leg{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .leg:last-child{border-bottom:none}
  .leg-c{width:26px;height:26px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--turq);color:var(--turq);border-radius:7px;font-family:'Secular One';font-size:14px}
  .leg b{font-weight:600}.leg i{font-style:normal;color:var(--dim);font-size:12.5px}
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,20,19,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe);z-index:50}
  .tab{flex:1;background:none;border:none;color:var(--dim);padding:11px 4px 9px;font-family:'Heebo';font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
  .tab svg{width:23px;height:23px;stroke:var(--dim);fill:none;stroke-width:1.7}
  .tab.on{color:var(--turq)} .tab.on svg{stroke:var(--turq)}
</style>
</head>
<body>

<main id="view"></main>

<nav>
  <button class="tab on" data-tab="today" aria-label="היום">
    <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>היום
  </button>
  <button class="tab" data-tab="calendar" aria-label="לוח">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>לוח
  </button>
  <button class="tab" data-tab="workout" aria-label="אימון">
    <svg viewBox="0 0 24 24"><path d="M6 7v10M18 7v10M3 9v6M21 9v6M6 12h12"/></svg>אימון
  </button>
  <button class="tab" data-tab="nutrition" aria-label="תזונה">
    <svg viewBox="0 0 24 24"><path d="M6 3v7a3 3 0 0 0 6 0V3M9 3v18M17 3c-1.5 1-2 3-2 6s.5 4 2 4v8"/></svg>תזונה
  </button>
  <button class="tab" data-tab="progress" aria-label="התקדמות">
    <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>התקדמות
  </button>
</nav>

<script src="./sync.js"></script>
<script src="./app.js"></script>
</body>
</html>
